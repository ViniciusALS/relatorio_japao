# Configuracao nginx do frontend (staging djr.jrcbrasil.net).
#
# Two-origin: a SPA chama o backend direto em https://api.djr.jrcbrasil.net/api
# (CORS liberado no Django). Este nginx NAO faz proxy de /api — apenas serve a
# SPA. O TLS e terminado pelo nginx-proxy/acme-companion na frente deste container.
server {
    listen 80 default_server;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP especifica de staging: connect-src libera a API em api.djr.jrcbrasil.net.
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://api.djr.jrcbrasil.net; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; script-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;

    # Assets com hash do Vite: cache imutavel.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        try_files $uri =404;
    }

    # Icones/fontes: cache curto.
    location ~* \.(?:ico|png|jpg|jpeg|gif|svg|webp|woff2?|ttf|webmanifest)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # SPA fallback (React Router) — toda rota cai no index.html.
    location / {
        add_header Cache-Control "no-store, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}
