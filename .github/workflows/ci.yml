name: CI

# Gate de qualidade. Roda em PRs para staging/main e em push direto para main
# (licao cicd 44: push direto a branch protegido nao deve escapar do gate).
# Tambem e chamavel (workflow_call) pelo cd-staging.yml como gate de deploy.
on:
  pull_request:
    branches: [staging, main]
  push:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Django) — check + pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/backend
    env:
      SECRET_KEY: ci-insecure-secret-key
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_NAME: relatorio_japao
      DB_USER: relatorio_japao
      DB_PASSWORD: relatorio_japao
      DB_HOST: localhost
      DB_PORT: "5432"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: relatorio_japao
          POSTGRES_PASSWORD: relatorio_japao
          POSTGRES_DB: relatorio_japao
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U relatorio_japao"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: packages/backend/requirements.txt
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Django system check
        run: python manage.py check
      - name: Testes (pytest)
        run: pytest -q

  frontend:
    name: Frontend (React/Vite) — lint + build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/frontend/package-lock.json
      - name: Instalar dependencias
        run: npm ci
      - name: Lint (ESLint)
        run: npm run lint
      - name: Build (Vite)
        run: npm run build
      - name: Testes (Vitest)
        run: npm run test
